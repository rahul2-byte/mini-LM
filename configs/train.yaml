# Baseline pretraining settings for the first non-smoke run.
sequence_length: 512
# Start with one sequence per GPU micro-batch for 6 GB VRAM safety.
micro_batch_size: 1
# Accumulate gradients to approximate a larger effective batch without holding
# all examples in GPU memory at once.
gradient_accumulation_steps: 32
# fp16 saves VRAM on the target NVIDIA GPU; use fp32 for CPU debugging.
precision: fp16
learning_rate: 3.0e-4
weight_decay: 0.1
# Warmup protects early optimization while random-init weights are unstable.
warmup_steps: 1000
gradient_clip_norm: 1.0
# Periodic checkpoints/evaluations bound recovery loss and expose regressions.
checkpoint_every_steps: 1000
eval_every_steps: 1000
# Retention prevents checkpoints from consuming the entire disk budget.
keep_last_checkpoints: 3
