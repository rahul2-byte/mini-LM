# CPU-friendly end-to-end test settings. These values are intentionally much
# smaller than the training defaults and exist to validate wiring.
sequence_length: 32
# Two examples per loader batch keeps the fixture test short.
micro_batch_size: 2
# One means every batch immediately updates the model.
gradient_accumulation_steps: 1
# Avoid CUDA-only behavior in the default smoke command.
precision: fp32
learning_rate: 3.0e-4
weight_decay: 0.1
# A one-step warmup exercises scheduler construction without slowing the test.
warmup_steps: 1
gradient_clip_norm: 1.0
# Save at the end so the smoke test can load a fresh model from disk.
checkpoint_every_steps: 3
eval_every_steps: 1
max_steps: 3
# Tiny architecture for fast feedback; this is not the 20M ladder rung.
n_layers: 2
n_heads: 4
embedding_dim: 128
